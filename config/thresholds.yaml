# Personal-OS 系统阈值配置 (System Thresholds)
# 所有逻辑引擎与评分框架的硬编码数字统一在此管理。

# === 产出与工作 (Output & Work) ===
deep_work:
  minimum_hours: 4.0          # 工作日低于此值触发关联性检查告警 (可能整天在开会)

# === 睡眠与健康 (Sleep & Health) ===
sleep:
  baseline_hours: 7.5         # 睡眠基准时长，低于此值计入睡眠负债 (与 ideal_range 下沿对齐)
  debt_window_days: 7          # 滚动窗口天数，仅计算近 N 天的负债 (旧数据自动衰减)
  debt_recovery_streak: 3      # 连续 N 天 ≥ baseline 即可解锁 Level 1 运动限制
  ideal_range: [7.5, 8.5]     # 理想睡眠时长区间
  poor_streak_alert: 3        # 连续 Poor 天数触发健康预警
  # COROS 睡眠结构参考范围 (新 schema: 分钟为单位)
  deep_min_range: [60, 150]   # 深睡分钟正常区间 (~16-30% @ 7-9h)
  rem_min_range: [50, 140]    # REM 分钟正常区间
  awake_min_warning: 40       # 清醒分钟预警 (>此值且 HRV 偏低 → Poor Sleep)
  nap_compensation_min: 45    # 白天 nap 达此值可部分抵消当日睡眠负债
  hrv_warning_low: 30         # HRV 绝对红线 (触发熔断器) (ms)

# === 就绪度 (Readiness — COROS) ===
readiness:
  hrv_rel_baseline_min: 0.85  # HRV < 0.85 × baseline 判为低恢复 (黄线 warning)
  load_ratio_overtraining: 1.5 # ATI/CTI > 此值触发过训熔断
  tired_rate_warning: -30     # tired_rate < 此值预警偏疲劳

# === 身体成分 (Body Composition — Zepp Life) ===
body:
  body_fat_pct_range: [10, 20]   # 体脂率正常区间 % (男性)
  muscle_kg_min: 50.0            # 肌肉量下限 (kg)
  visceral_fat_max: 9            # 内脏脂肪等级上限
  bmi_range: [18.5, 24.9]       # BMI 正常区间
  water_pct_min: 55.0            # 水分比例下限 %
  protein_pct_min: 16.0          # 蛋白质比例下限 %
  bone_mass_kg_min: 3.0          # 骨量下限 (kg)
  basal_metabolism_min: 1600     # 基础代谢下限 (kcal)

# === 精力 (Energy) ===
energy:
  low_threshold: 4             # 低于此值视为精力严重不足
  warning_threshold: 5         # 低于此值触发精力预警

# === 财务 (Financials) ===
finance:
  savings_target_pct: 20       # 储蓄目标占收入百分比
  weekly_spend_alert: 120.0    # 周度支出超过此值触发告警 (MYR, 目标 RM100 + 20% buffer)
  daily_spend_alert: 25.0      # 单日支出超过此值触发预警 (全自炊日约 RM20-23, 超 25 说明有外食)

# === 咖啡因 (Caffeine) ===
caffeine:
  cutoff_time: "14:00"         # 下午最晚咖啡因摄入时间
  late_cutoff_time: "16:00"    # 超过此时间视为严重违规，强关联失眠

# === 作息 (Schedule) ===
schedule:
  wakeup_target: "06:30"
  core_work_start: "09:00"
  core_work_end: "18:00"
  shutdown_time: "22:00"       # 强制断电协议

# === 熔断规则 (Circuit Breakers) ===
# IF 条件触发 → THEN 强制执行行为限制。逻辑引擎自动输出告警。
circuit_breakers:
  - name: "Sleep Critical"
    description: "单日睡眠严重不足"
    condition:
      metric: sleep_duration
      operator: "<"
      value: 6.5
    actions:
      - "禁止晨跑，改为低心率快走或完全休息"
      - "禁止大重量抗阻训练 (Deload only)"
      - "Deep Work 上限 4h，强制午休 20min"
      - "22:00 强制断电零容忍"

  - name: "Sleep Debt Level 1"
    description: "7天滚动睡眠负债中度 (5-8h)"
    condition:
      metric: rolling_7d_sleep_debt    # 仅计算近 7 天 vs baseline(7.5h) 的累计差额
      operator: ">="
      value: 5.0
    actions:
      - "晨跑降级为 Zone 2 慢跑 (HR ≤ 145bpm, ≤ 30min)，禁止 Tempo/间歇"
      - "抗阻训练降重 30% (Deload Mode)"
      - "每日强制补午休 20-30min"
      - "连续 3 天 ≥ 7.5h 睡眠后自动解除本级限制"

  - name: "Sleep Debt Level 2"
    description: "7天滚动睡眠负债严重 (>8h)"
    condition:
      metric: rolling_7d_sleep_debt
      operator: ">"
      value: 8.0
    actions:
      - "晨跑降级为低心率快走 (HR < 120bpm)，禁止一切跑步"
      - "抗阻训练降重 50% 或改为纯徒手"
      - "每日强制补午休 20-30min"
      - "周末禁止安排任何产出目标"
      - "降至 Level 1 后恢复 Zone 2 慢跑权限"

  - name: "Energy Collapse"
    description: "精力值跌破安全线"
    condition:
      metric: energy_level
      operator: "<"
      value: 4
    actions:
      - "当日立即取消所有训练"
      - "Deep Work 上限 2h，仅允许低认知任务"
      - "提前至 21:30 执行断电协议"
      - "次日晨间禁止跑步"

  - name: "Mental Overload"
    description: "心智负荷过载"
    condition:
      metric: mental_load
      operator: ">="
      value: 7
    actions:
      - "禁止当日安排额外会议或社交"
      - "Deep Work 切换为单任务模式 (禁止并行)"
      - "强制插入 15min 散步/呼吸间隔 per 2h"
      - "晚间禁止技术阅读，仅允许轻度娱乐"

  - name: "Consecutive Poor Sleep"
    description: "连续多日低质量睡眠"
    condition:
      metric: consecutive_poor_sleep
      operator: ">="
      value: 2
    actions:
      - "触发 System Offline 模式：次日视为恢复日"
      - "禁止一切高强度训练直到录得 1 天 Fair+"
      - "咖啡因窗口收紧至 10:00 前"
      - "Deep Work 上限 3h"

  - name: "HRV Recovery Alert"
    description: "HRV 跌破恢复安全线，身体修复能力受损"
    condition:
      metric: hrv
      operator: "<"
      value: 30               # 与 sleep.hrv_warning_low 对齐
    actions:
      - "当日禁止一切高强度训练，仅允许拉伸/快走"
      - "强制午休 20-30min"
      - "22:00 强制断电零容忍"
      - "次日如 HRV 仍 < 30，触发 System Offline 恢复日"

  - name: "Spending Surge"
    description: "单笔大额消费预警"
    condition:
      metric: single_transaction
      operator: ">"
      value: 30.0             # 单笔超 RM30 触发 (覆盖绝大多数外食场景)
    actions:
      - "日志中必须记录消费理由 (合理代偿/社交/冲动)"
      - "当周剩余天数自炊率必须 ≥ 95%"
      - "如本周已触发 2 次，锁定周末外食额度为 RM0"

  - name: "Overtraining Warning"
    description: "ATI/CTI 急慢比过训预警"
    condition:
      metric: load_ratio
      operator: ">"
      value: 1.5             # 与 readiness.load_ratio_overtraining 对齐
    actions:
      - "当日禁止安排额外训练，改为主动恢复 (拉伸/散步)"
      - "下一次训练降重 30% 至 load_ratio < 1.3"
      - "强制 8h 睡眠机会窗口"
      - "次日 HRV 必须反弹至 baseline 以上才恢复训练"

# === 评分框架 (Scoring Framework — 4 维 100 分) ===
# 每维拆分为若干 criterion，code 计算 base_score，AI 只做 qualitative bonus/penalty。
# formula: "proportional" (actual/target * max) | "threshold" ([[cutoff, pts], ...]) | "inverse_proportional"
scoring:
  output_max: 40
  health_max: 30
  mental_max: 20
  habits_max: 10

  output:
    max_points: 40
    criteria:
      deep_work:
        formula: proportional
        target_hours: 30
        max_points: 25
      output_quality:
        formula: proportional
        target: 1.0              # AI fills quality_score 0-1, multiplied by max
        max_points: 10
      blocker_management:
        formula: proportional
        target: 1.0              # AI fills 0-1
        max_points: 5

  health:
    max_points: 30
    criteria:
      avg_energy:
        formula: proportional
        target: 7
        max_points: 8
      poor_sleep_days:
        formula: threshold
        # fewer is better — cutoffs count-below-or-equal-to → points
        thresholds: [[0, 10], [1, 7], [2, 4]]
        else_points: 1
        max_points: 10
      rolling_sleep_debt:
        formula: threshold
        # debt in hours; smaller is better
        thresholds: [[3, 7], [5, 5], [10, 3]]
        else_points: 0
        max_points: 7
      sleep_structure:
        formula: proportional
        target: 1.0              # AI fills 0-1 based on deep_min/HRV/rel-baseline
        max_points: 3
      body_composition:
        formula: proportional
        target: 1.0              # AI fills 0-1 based on trend
        max_points: 2

  mental:
    max_points: 20
    criteria:
      avg_mental_load:
        formula: threshold
        # lower is better (load <= cutoff → points)
        thresholds: [[4, 10], [6, 7], [8, 4]]
        else_points: 1
        max_points: 10
      crisis_handling:
        formula: proportional
        target: 1.0              # AI fills 0-1
        max_points: 5
      emotional_resilience:
        formula: proportional
        target: 1.0
        max_points: 5

  habits:
    max_points: 10
    criteria:
      weekly_spend:
        formula: inverse_proportional
        # RM100 baseline; scales down to 0 at RM250. max * max(0, 1 - (spend-100)/150)
        target: 100.0
        scale: 150.0
        max_points: 5
      caffeine_compliance:
        formula: proportional
        target: 1.0              # fraction of days cutoff before 14:00
        max_points: 3
      sleep_duration_consistency:
        formula: threshold
        # stddev of sleep.duration across week (hours); smaller is better
        thresholds: [[0.5, 2], [0.75, 1]]
        else_points: 0
        max_points: 2
